name: Build and Push Server Image

on:
    push:
        branches:
            - main

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout source code
              uses: actions/checkout@v4

            # Исправлено: правильный официальный путь к установщику Buildx
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            # Исправлено: правильный официальный путь к экшену авторизации
            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Downcase repository owner name
              run: |
                  echo "REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

            # Обновлено до актуальной v6
            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./Dockerfile
                  push: true
                  tags: |
                      ghcr.io/${{ env.REPO_OWNER }}/shreeemp-server:latest
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
